<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL-ABUZAR PERFUMES</title>
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
<link rel="manifest" href="assets/favicon/site.webmanifest">
<link rel="icon" href="assets/favicon/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#d4af37;
  --gold-bright:#e6c65a;
  --gold-dim:rgba(212,175,55,0.6);
  --black:#000;
  --black-soft:#0b0b0b;
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--black);
}

/* ============================================================
   STAGE
============================================================ */
#stage{
  position:fixed;
  inset:0;
  background:var(--black);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:stageFadeOut 0.8s ease forwards 5.2s;
}

@keyframes stageFadeOut{
  to{opacity:0;pointer-events:none;}
}

/* ============================================================
   OPENING VEIL
============================================================ */
#veil{
  position:absolute;
  inset:0;
  background:var(--black);
  animation:veilReveal 0.9s cubic-bezier(0.77,0,0.18,1) forwards 0.1s;
  z-index:10;
}

@keyframes veilReveal{
  to{opacity:0;pointer-events:none;}
}

/* ============================================================
   BACKGROUND RADIAL GLOW
============================================================ */
#bg-glow{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 60% 55% at 50% 55%, rgba(212,175,55,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 30% 30% at 70% 20%, rgba(212,175,55,0.05) 0%, transparent 60%);
  opacity:0;
  animation:glowIn 1.4s ease forwards 0.8s;
}

@keyframes glowIn{
  to{opacity:1;}
}

/* ============================================================
   PARTICLE CANVAS WRAPPER
============================================================ */
#particle-layer{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

/* ---- Generated particles (JS adds them) ---- */
.particle{
  position:absolute;
  border-radius:50%;
  background:var(--gold);
  pointer-events:none;
  opacity:0;
  animation:particleDrift var(--dur,4s) ease-in-out var(--delay,0s) forwards;
}

@keyframes particleDrift{
  0%  {opacity:0; transform:translate(0,0) scale(0);}
  15% {opacity:var(--peak,0.9); transform:translate(var(--tx1,10px),var(--ty1,-20px)) scale(1);}
  85% {opacity:var(--peak,0.9); transform:translate(var(--tx2,30px),var(--ty2,-120px)) scale(0.7);}
  100%{opacity:0; transform:translate(var(--tx3,50px),var(--ty3,-200px)) scale(0);}
}

/* geometric diamond sparks */
.geo{
  position:absolute;
  width:6px;height:6px;
  background:var(--gold-bright);
  transform:rotate(45deg);
  opacity:0;
  animation:geoFloat var(--dur,3s) ease var(--delay,0s) forwards;
}

@keyframes geoFloat{
  0%  {opacity:0;transform:rotate(45deg) scale(0);}
  20% {opacity:0.8;transform:rotate(45deg) scale(1);}
  80% {opacity:0.6;transform:rotate(225deg) scale(0.6) translateY(-80px);}
  100%{opacity:0;transform:rotate(405deg) scale(0) translateY(-160px);}
}

/* ============================================================
   BOTTLE CONTAINER
============================================================ */
#bottle-wrap{
  position:absolute;
  width:160px;height:320px;
  /* slightly above center */
  top:50%;left:50%;
  transform:translate(-50%,-54%);
  opacity:0;
  animation:bottleEnter 1.1s cubic-bezier(0.34,1.56,0.64,1) forwards 0.7s;
}

@keyframes bottleEnter{
  0%  {opacity:0;transform:translate(-50%,-44%) scale(0.6) rotateY(-40deg);}
  60% {opacity:1;}
  100%{opacity:1;transform:translate(-50%,-54%) scale(1) rotateY(0deg);}
}

/* Continuous subtle rotation */
#bottle-wrap{
  animation:
    bottleEnter 1.1s cubic-bezier(0.34,1.56,0.64,1) forwards 0.7s,
    bottleSpin 6s ease-in-out 1.8s infinite;
}

@keyframes bottleSpin{
  0%  {transform:translate(-50%,-54%) rotateY(0deg);}
  25% {transform:translate(-50%,-54%) rotateY(10deg);}
  75% {transform:translate(-50%,-54%) rotateY(-10deg);}
  100%{transform:translate(-50%,-54%) rotateY(0deg);}
}

/* ---- BOTTLE SHAPE ---- */
#bottle{
  position:relative;
  width:100%;height:100%;
  perspective:600px;
}

/* Neck */
.b-neck{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:32px;
  height:60px;
  top:0;
  background:linear-gradient(180deg,
    rgba(255,255,255,0.12) 0%,
    rgba(212,175,55,0.25) 40%,
    rgba(180,140,20,0.35) 100%
  );
  border:1px solid rgba(212,175,55,0.5);
  border-radius:4px 4px 0 0;
  overflow:hidden;
}

.b-neck::after{
  content:'';
  position:absolute;
  left:30%;width:20%;height:100%;
  background:rgba(255,255,255,0.18);
  filter:blur(2px);
}

/* Cap */
.b-cap{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:40px;height:24px;
  top:-24px;
  background:linear-gradient(180deg,#e6c65a,#a07c10);
  border-radius:6px 6px 3px 3px;
  box-shadow:0 0 12px rgba(212,175,55,0.5), 0 2px 6px rgba(0,0,0,0.6);
}

.b-cap::after{
  content:'';
  position:absolute;
  left:25%;width:20%;height:70%;top:15%;
  background:rgba(255,255,255,0.35);
  border-radius:2px;
  filter:blur(1px);
}

/* Body */
.b-body{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:100px;height:224px;
  top:58px;
  background:linear-gradient(160deg,
    rgba(255,255,255,0.07) 0%,
    rgba(212,175,55,0.15) 20%,
    rgba(10,8,3,0.92) 50%,
    rgba(212,175,55,0.12) 80%,
    rgba(255,255,255,0.05) 100%
  );
  border:1px solid rgba(212,175,55,0.45);
  border-radius:8px 8px 22px 22px;
  overflow:hidden;
  box-shadow:
    0 0 40px rgba(212,175,55,0.15),
    inset 0 0 30px rgba(0,0,0,0.7),
    0 20px 60px rgba(0,0,0,0.8);
}

/* Glass highlight stripe */
.b-body::before{
  content:'';
  position:absolute;
  left:12%;width:14%;height:88%;top:6%;
  background:linear-gradient(180deg,
    rgba(255,255,255,0.22) 0%,
    rgba(255,255,255,0.08) 60%,
    transparent 100%
  );
  border-radius:6px;
  filter:blur(3px);
}

/* Glass edge reflection */
.b-body::after{
  content:'';
  position:absolute;
  right:8%;width:6%;height:60%;top:15%;
  background:rgba(255,255,255,0.1);
  filter:blur(2px);
  border-radius:4px;
}

/* ---- LIQUID ---- */
.b-liquid{
  position:absolute;
  bottom:0;left:0;right:0;
  height:62%;
  background:linear-gradient(180deg,
    rgba(212,175,55,0.0) 0%,
    rgba(212,175,55,0.18) 15%,
    rgba(160,100,10,0.55) 45%,
    rgba(120,70,5,0.75) 100%
  );
  animation:liquidRise 1.6s ease forwards 1.2s, liquidSwirl 4s ease-in-out 2.8s infinite;
  transform-origin:bottom center;
  transform:scaleY(0);
}

@keyframes liquidRise{
  to{transform:scaleY(1);}
}

@keyframes liquidSwirl{
  0%,100%{clip-path:ellipse(55% 100% at 50% 100%);}
  25%     {clip-path:ellipse(52% 100% at 55% 100%);}
  50%     {clip-path:ellipse(58% 100% at 50% 100%);}
  75%     {clip-path:ellipse(52% 100% at 45% 100%);}
}

/* liquid shimmer wave */
.b-shimmer{
  position:absolute;
  top:0;left:-100%;
  width:300%;height:100%;
  background:linear-gradient(
    105deg,
    transparent 30%,
    rgba(230,198,90,0.35) 50%,
    transparent 70%
  );
  animation:shimmerPass 2.4s ease-in-out 2.8s infinite;
}

@keyframes shimmerPass{
  0%  {left:-100%;}
  100%{left:60%;}
}

/* ---- LABEL PLATE ---- */
.b-label{
  position:absolute;
  left:50%;transform:translateX(-50%);
  top:30%;
  width:72px;height:72px;
  border:1px solid rgba(212,175,55,0.6);
  background:rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  animation:labelReveal 0.6s ease forwards 2s;
}

@keyframes labelReveal{
  to{opacity:1;}
}

.b-label svg{
  width:44px;height:44px;
  opacity:0.85;
}

/* ---- BOTTLE GLOW ---- */
.b-glow{
  position:absolute;
  inset:-40px;
  background:radial-gradient(ellipse 70% 50% at 50% 70%, rgba(212,175,55,0.18) 0%, transparent 70%);
  animation:pulseGlow 2.4s ease-in-out 2s infinite;
  pointer-events:none;
  z-index:-1;
}

@keyframes pulseGlow{
  0%,100%{opacity:0.7;transform:scale(1);}
  50%     {opacity:1;transform:scale(1.08);}
}

/* ---- CAUSTIC RINGS ---- */
.caustic{
  position:absolute;
  left:50%;bottom:-14px;
  transform:translateX(-50%);
  border-radius:50%;
  border:1px solid rgba(212,175,55,0.2);
  animation:causticPulse 2s ease-in-out var(--delay,0s) infinite;
  pointer-events:none;
}

@keyframes causticPulse{
  0%  {opacity:0.6;transform:translateX(-50%) scale(0.9);}
  50% {opacity:0.15;transform:translateX(-50%) scale(1.4);}
  100%{opacity:0;transform:translateX(-50%) scale(1.9);}
}

/* ============================================================
   TEXT SECTION
============================================================ */
#text-wrap{
  position:absolute;
  bottom:18%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  white-space:nowrap;
}

/* Brand name letter-by-letter */
#brand-name{
  display:flex;
  justify-content:center;
  gap:2px;
  margin-bottom:10px;
}

.letter{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-size:clamp(28px,5.5vw,54px);
  font-weight:700;
  color:var(--gold);
  letter-spacing:0.12em;
  text-shadow:
    0 0 20px rgba(212,175,55,0.9),
    0 0 60px rgba(212,175,55,0.5),
    0 0 100px rgba(212,175,55,0.25);
  opacity:0;
  transform:translateY(30px) scale(0.8);
  animation:letterIn 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

@keyframes letterIn{
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* Divider line */
#divider{
  width:0;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  margin:0 auto 10px;
  opacity:0;
  animation:dividerExpand 0.7s ease forwards 2.45s;
}

@keyframes dividerExpand{
  to{width:min(340px,70vw);opacity:1;}
}

/* Subtitle */
#subtitle{
  font-family:'Amiri',serif;
  font-size:clamp(11px,2vw,16px);
  color:rgba(212,175,55,0.7);
  letter-spacing:0.35em;
  text-transform:uppercase;
  opacity:0;
  transform:translateY(10px);
  animation:subIn 0.8s ease forwards 2.65s;
}

@keyframes subIn{
  to{opacity:1;transform:translateY(0);}
}

/* Arabic line */
#arabic-sub{
  font-family:'Amiri',serif;
  font-size:clamp(13px,2.4vw,20px);
  color:rgba(212,175,55,0.5);
  margin-top:6px;
  opacity:0;
  animation:subIn 0.8s ease forwards 2.9s;
  direction:rtl;
}

/* ============================================================
   SOUND WAVE BARS (cinematic flair)
============================================================ */
#soundwave{
  position:absolute;
  bottom:8%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:flex-end;
  gap:3px;
  height:28px;
  opacity:0;
  animation:subIn 0.6s ease forwards 1.2s, soundwaveOut 0.4s ease forwards 4.6s;
}

.bar{
  width:3px;
  background:var(--gold);
  border-radius:2px;
  opacity:0.6;
  animation:barPulse var(--bd,0.7s) ease-in-out infinite alternate;
  height:var(--bh,10px);
}

@keyframes barPulse{
  to{height:var(--bh2,20px);opacity:1;}
}

@keyframes soundwaveOut{
  to{opacity:0;}
}

/* ============================================================
   CORNER ORNAMENTS
============================================================ */
.corner{
  position:absolute;
  width:50px;height:50px;
  border-color:rgba(212,175,55,0.35);
  border-style:solid;
  opacity:0;
  animation:cornerReveal 0.7s ease forwards 1.5s;
}

@keyframes cornerReveal{
  to{opacity:1;}
}

.corner-tl{top:5%;left:5%;border-width:1px 0 0 1px;}
.corner-tr{top:5%;right:5%;border-width:1px 1px 0 0;}
.corner-bl{bottom:5%;left:5%;border-width:0 0 1px 1px;}
.corner-br{bottom:5%;right:5%;border-width:0 1px 1px 0;}

/* ============================================================
   FINAL FLASH
============================================================ */
#flash{
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(212,175,55,0.14) 0%, transparent 70%);
  opacity:0;
  animation:flashIn 0.6s ease forwards 3.5s, flashOut 0.8s ease forwards 4.5s;
  pointer-events:none;
}

@keyframes flashIn{
  to{opacity:1;}
}

@keyframes flashOut{
  to{opacity:0;}
}

/* ============================================================
   DEPTH-OF-FIELD blur on edges
============================================================ */
#dof{
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 50% 50% at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
  pointer-events:none;
}

/* ============================================================
   PROGRESS BAR (subtle)
============================================================ */
#progress{
  position:absolute;
  bottom:0;left:0;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  width:0;
  animation:progressFill 5s linear forwards 0.1s;
  opacity:0.5;
}

@keyframes progressFill{
  to{width:100%;}
}
</style>
</head>
<body>

<!-- ===================== STAGE ===================== -->
<div id="stage">

  <!-- Opening veil -->
  <div id="veil"></div>

  <!-- Background ambient glow -->
  <div id="bg-glow"></div>

  <!-- Particles injected by JS -->
  <div id="particle-layer"></div>

  <!-- Depth-of-field overlay -->
  <div id="dof"></div>

  <!-- Corner ornaments -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- =========== BOTTLE =========== -->
  <div id="bottle-wrap">
    <div id="bottle">
      <!-- Cap -->
      <div class="b-neck">
        <div class="b-cap"></div>
      </div>
      <!-- Body -->
      <div class="b-body">
        <!-- Liquid -->
        <div class="b-liquid">
          <div class="b-shimmer"></div>
        </div>
        <!-- Logo label -->
        <div class="b-label">
          <!-- inline SVG monogram -->
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="22" cy="22" r="20" stroke="#d4af37" stroke-width="0.8" opacity="0.7"/>
            <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"
                  font-family="Cinzel,serif" font-size="13" fill="#d4af37" letter-spacing="1">AA</text>
          </svg>
        </div>
      </div>
      <!-- Glow -->
      <div class="b-glow"></div>
      <!-- Caustic rings -->
      <div class="caustic" style="width:100px;height:18px;--delay:0s;"></div>
      <div class="caustic" style="width:130px;height:22px;--delay:0.4s;"></div>
      <div class="caustic" style="width:160px;height:26px;--delay:0.8s;"></div>
    </div>
  </div>

  <!-- =========== TEXT =========== -->
  <div id="text-wrap">
    <div id="brand-name">
      <!-- Letters injected by JS -->
    </div>
    <div id="divider"></div>
    <div id="subtitle">Luxury Arabian Fragrances</div>
    <div id="arabic-sub">عطور العربية الفاخرة</div>
  </div>

  <!-- Sound wave -->
  <div id="soundwave"></div>

  <!-- Final flash -->
  <div id="flash"></div>

  <!-- Progress bar -->
  <div id="progress"></div>

</div>

<script>
/* ============================================================
   PARTICLES
============================================================ */
(function spawnParticles(){
  const layer = document.getElementById('particle-layer');
  const W = window.innerWidth, H = window.innerHeight;

  // round dust particles
  for(let i = 0; i < 80; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    const x = Math.random() * W;
    const y = Math.random() * H * 0.85 + H * 0.05;
    const delay = Math.random() * 4;
    const dur = 3 + Math.random() * 3;
    const tx1 = (Math.random() - 0.5) * 60;
    const ty1 = -(Math.random() * 40 + 10);
    const tx2 = tx1 + (Math.random() - 0.5) * 80;
    const ty2 = -(Math.random() * 130 + 60);
    const tx3 = tx2 + (Math.random() - 0.5) * 60;
    const ty3 = -(Math.random() * 180 + 120);
    const peak = 0.4 + Math.random() * 0.6;

    p.style.cssText = `
      left:${x}px; top:${y}px;
      width:${size}px; height:${size}px;
      --dur:${dur}s; --delay:${delay}s;
      --tx1:${tx1}px; --ty1:${ty1}px;
      --tx2:${tx2}px; --ty2:${ty2}px;
      --tx3:${tx3}px; --ty3:${ty3}px;
      --peak:${peak};
    `;
    layer.appendChild(p);
  }

  // geometric diamond sparks
  for(let i = 0; i < 24; i++){
    const g = document.createElement('div');
    g.className = 'geo';
    const x = Math.random() * W;
    const y = Math.random() * H;
    const delay = Math.random() * 4.5;
    const dur = 2.5 + Math.random() * 2;
    const size = 3 + Math.random() * 5;
    g.style.cssText = `
      left:${x}px; top:${y}px;
      width:${size}px; height:${size}px;
      --dur:${dur}s; --delay:${delay}s;
    `;
    layer.appendChild(g);
  }
})();

/* ============================================================
   LETTER-BY-LETTER TEXT REVEAL
============================================================ */
(function buildLetters(){
  const text = 'AL-ABUZAR';
  const container = document.getElementById('brand-name');
  const baseDelay = 1.55; // seconds after page load

  text.split('').forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'letter';
    span.textContent = ch === '-' ? '\u2013' : ch;
    // stagger each letter
    span.style.animationDelay = (baseDelay + i * 0.08) + 's';
    container.appendChild(span);
  });
})();

/* ============================================================
   SOUND WAVE BARS
============================================================ */
(function buildWave(){
  const sw = document.getElementById('soundwave');
  const heights = [8,12,18,24,20,28,22,16,24,18,12,20,26,18,14,22,28,20,16,12,8];
  heights.forEach((h, i) => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    const h2 = Math.min(h * 1.8, 28);
    bar.style.cssText = `
      height:${h}px;
      --bh:${h}px;
      --bh2:${h2}px;
      --bd:${0.5 + Math.random() * 0.6}s;
      animation-delay:${i * 0.045}s;
    `;
    sw.appendChild(bar);
  });
})();

/* ============================================================
   REDIRECT after animation
============================================================ */
setTimeout(() => {
  sessionStorage.setItem('introShown', '1');
  window.location.href = 'index.html';
}, 6100);
</script>
</body>
</html>
