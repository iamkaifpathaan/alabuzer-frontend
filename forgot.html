<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
</head>

<body style="background:#0b0b0b;color:white;font-family:Montserrat">

<div style="max-width:400px;margin:auto;margin-top:100px">

<h3>Password Reset</h3>

<input id="email" placeholder="Email">
<button onclick="sendOtp()">Send OTP</button>

<br><br>

<input id="otp" placeholder="OTP">
<input id="password" placeholder="New Password" type="password">

<button onclick="resetPassword()">Reset Password</button>

</div>

<script>

async function sendOtp(){

const email = document.getElementById("email").value;

await fetch("https://alabuzer-backend.onrender.com/api/auth/send-otp",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email})

});

alert("OTP sent");

}

async function resetPassword(){

const email = document.getElementById("email").value;
const otp = document.getElementById("otp").value;
const newPassword = document.getElementById("password").value;

const res = await fetch("https://alabuzer-backend.onrender.com/api/auth/reset-password",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,otp,newPassword})

});

const data = await res.json();

alert(data.message);

}

</script>

</body>
</html>
