<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
<link rel="manifest" href="assets/favicon/site.webmanifest">
<link rel="icon" href="assets/favicon/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0b0b0b;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #111;
  padding: 30px;
  width: 320px;
  border: 1px solid rgba(212,175,55,0.3);
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #0b0b0b;
  border: 1px solid #333;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: var(--lux-gold);
  border: none;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

.toggle {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: var(--lux-gold);
}
</style>
</head>

<body>

<div class="box">

  <h3 id="title">Login</h3>

  <input id="name" placeholder="Name (signup only)" style="display:none;">
  <input id="email" type="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <input id="confirmPassword" placeholder="Confirm Password" type="password" style="display:none;">
  <input id="phone" placeholder="Phone (signup only)" style="display:none;">

  <button onclick="submitAuth()">Continue</button>

  <div class="toggle" onclick="toggleMode()">Switch to Signup</div>
  <div style="text-align:center;margin-top:10px;color:#aaa;cursor:pointer"
  onclick="navigateWithTransition('forgot.html')">

Forgot Password?

</div>

</div>
<script src="js/common.js"></script>
<script>
let isLogin = true;

function toggleMode() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Signup";
  document.getElementById("name").style.display = isLogin ? "none" : "block";
  document.getElementById("phone").style.display = isLogin ? "none" : "block";
  document.getElementById("confirmPassword").style.display = isLogin ? "none" : "block";
  document.querySelector(".toggle").innerText =
    isLogin ? "Switch to Signup" : "Switch to Login";
}

async function submitAuth() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(!emailPattern.test(email)){
  alert("Please enter a valid email address");
  return;
  }

  if(!isLogin && password !== confirmPassword){
  alert("Passwords do not match");
  return;
  }

  if(password.length < 6){
  alert("Password must be at least 6 characters");
  return;
  }

  let url = "https://alabuzer-backend.onrender.com/api/auth/login";
  let body = { email, password };

  if (!isLogin) {
    url = "https://alabuzer-backend.onrender.com/api/auth/signup";
    body = {
      name: document.getElementById("name").value,
      email,
      password,
      phone: document.getElementById("phone").value
    };
  }

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  const data = await res.json();

  if (data.success) {

  if(isLogin){
    // 🔐 SAVE TOKEN
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));

    alert("Login Successful ✅");
    navigateWithTransition("index.html");

  } else {
    alert("Signup Successful ✅ Please Login");
    toggleMode();
  }

} else {
  alert(data.message || "Error");
}
}
</script>

</body>
</html>
