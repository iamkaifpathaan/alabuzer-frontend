<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="styles/global.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
<link rel="manifest" href="assets/favicon/site.webmanifest">
<link rel="icon" href="assets/favicon/favicon.ico">
<title>Admin Products - AL-ABUZAR</title>
<style>

body{
  background:#0b0b0b;
  color:white;
  font-family:'Montserrat',sans-serif;
  padding:24px 20px;
  min-height:100vh;
}

.page-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1100px;
  margin:0 auto 24px;
  flex-wrap:wrap;
  gap:10px;
}

.page-header h2{
  color:#d4af37;
  font-size:24px;
  margin:0;
  letter-spacing:1px;
}

.container{
  max-width:1100px;
  margin:0 auto;
}

/* ===== ADD PRODUCT FORM ===== */

.add-form-card{
  background:#111;
  border:1px solid rgba(212,175,55,0.25);
  border-radius:12px;
  padding:24px;
  margin-bottom:32px;
}

.add-form-title{
  color:#d4af37;
  font-size:17px;
  font-weight:600;
  margin-bottom:18px;
  letter-spacing:0.5px;
}

.form-grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.form-grid-2 .full{
  grid-column:1 / -1;
}

.form-input{
  width:100%;
  box-sizing:border-box;
  padding:11px 14px;
  background:#0b0b0b;
  border:1px solid #333;
  color:white;
  border-radius:8px;
  font-family:'Montserrat',sans-serif;
  font-size:13px;
  transition:border-color 0.2s;
}

.form-input:focus{
  outline:none;
  border-color:rgba(212,175,55,0.5);
}

.form-input::placeholder{ color:#555; }

textarea.form-input{
  resize:vertical;
  min-height:80px;
}

select.form-input{
  cursor:pointer;
}

.form-actions{
  margin-top:16px;
}

.btn-primary{
  background:#d4af37;
  color:#000;
  border:none;
  padding:11px 22px;
  border-radius:8px;
  font-family:'Montserrat',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.btn-primary:hover{
  background:#c9a227;
  transform:translateY(-1px);
}

.btn-primary:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

/* ===== PRODUCT GRID ===== */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
}

.card{
  background:#111;
  border:1px solid rgba(212,175,55,0.25);
  padding:0;
  border-radius:12px;
  overflow:hidden;
  transition:border-color 0.2s, transform 0.2s;
}

.card:hover{
  border-color:rgba(212,175,55,0.5);
  transform:translateY(-2px);
}

.card-img-wrap{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  overflow:hidden;
}

.card-img-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.card-body{
  padding:14px;
}

.card-name{
  font-size:14px;
  font-weight:600;
  margin-bottom:6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.card-meta{
  font-size:12px;
  color:#888;
  margin-bottom:4px;
}

.card-price{
  color:#d4af37;
  font-weight:700;
  font-size:15px;
  margin-bottom:12px;
}

.card-price .original-price{
  text-decoration:line-through;
  color:#666;
  font-size:12px;
  font-weight:400;
  margin-left:6px;
}

.card-actions{
  display:flex;
  gap:8px;
}

.btn-edit{
  flex:1;
  padding:8px;
  background:rgba(212,175,55,0.1);
  border:1px solid rgba(212,175,55,0.4);
  color:#d4af37;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
  font-family:'Montserrat',sans-serif;
  font-weight:600;
  transition:0.2s;
}

.btn-edit:hover{
  background:rgba(212,175,55,0.2);
}

.btn-delete{
  flex:1;
  padding:8px;
  background:rgba(244,67,54,0.1);
  border:1px solid rgba(244,67,54,0.4);
  color:#f44336;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
  font-family:'Montserrat',sans-serif;
  font-weight:600;
  transition:0.2s;
}

.btn-delete:hover{
  background:rgba(244,67,54,0.2);
}

/* ===== MODAL ===== */

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(8px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding:20px;
}

.modal-overlay.active{
  display:flex;
}

.modal-box{
  background:#111;
  border:1px solid rgba(212,175,55,0.3);
  border-radius:14px;
  padding:28px;
  width:100%;
  max-width:480px;
  max-height:90vh;
  overflow-y:auto;
}

.modal-title{
  color:#d4af37;
  font-size:18px;
  font-weight:700;
  margin-bottom:20px;
  letter-spacing:0.5px;
}

.modal-form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:16px;
}

.modal-form-grid .full{
  grid-column:1 / -1;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.btn-cancel{
  flex:1;
  padding:11px;
  background:transparent;
  border:1px solid #444;
  color:#aaa;
  border-radius:8px;
  cursor:pointer;
  font-family:'Montserrat',sans-serif;
  font-size:13px;
  transition:0.2s;
}

.btn-cancel:hover{
  border-color:#666;
  color:#ccc;
}

/* ===== CONFIRM MODAL ===== */

.confirm-box{
  background:#111;
  border:1px solid rgba(244,67,54,0.3);
  border-radius:14px;
  padding:28px;
  width:100%;
  max-width:360px;
  text-align:center;
}

.confirm-box p{
  color:#aaa;
  font-size:14px;
  margin:8px 0 24px;
}

.btn-danger{
  flex:1;
  padding:11px;
  background:rgba(244,67,54,0.15);
  border:1px solid rgba(244,67,54,0.5);
  color:#f44336;
  border-radius:8px;
  cursor:pointer;
  font-family:'Montserrat',sans-serif;
  font-size:13px;
  font-weight:600;
  transition:0.2s;
}

.btn-danger:hover{
  background:rgba(244,67,54,0.25);
}

/* ===== TOAST ===== */

#toastContainer{
  position:fixed;
  top:20px;
  right:20px;
  z-index:99999;
  display:flex;
  flex-direction:column;
  gap:8px;
  pointer-events:none;
}

.toast{
  background:#1a1a1a;
  border:1px solid rgba(212,175,55,0.4);
  color:white;
  padding:12px 18px;
  border-radius:8px;
  font-size:13px;
  font-family:'Montserrat',sans-serif;
  animation:toastIn 0.3s ease;
  pointer-events:all;
  max-width:280px;
}

.toast.success{ border-color:rgba(0,200,83,0.5); color:#00c853; }
.toast.error  { border-color:rgba(244,67,54,0.5); color:#f44336; }

@keyframes toastIn{
  from{ opacity:0; transform:translateX(30px); }
  to  { opacity:1; transform:translateX(0);    }
}

/* ===== BADGE ===== */

.stock-badge{
  display:inline-block;
  padding:2px 8px;
  border-radius:10px;
  font-size:11px;
  font-weight:600;
}

.in-stock { background:rgba(0,200,83,0.12);  color:#00c853;  border:1px solid rgba(0,200,83,0.25); }
.low-stock{ background:rgba(255,152,0,0.12); color:#ff9800;  border:1px solid rgba(255,152,0,0.25); }
.no-stock { background:rgba(244,67,54,0.12); color:#f44336;  border:1px solid rgba(244,67,54,0.25); }

/* ===== MOBILE ===== */

@media(max-width:600px){
  body{ padding:16px 14px; }
  .form-grid-2{ grid-template-columns:1fr; }
  .modal-form-grid{ grid-template-columns:1fr; }
  .grid{ grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); }
}

</style>
</head>

<body>

<div id="toastContainer"></div>

<!-- ===== EDIT MODAL ===== -->
<div id="editModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Edit Product</div>
    <input type="hidden" id="editId">
    <div class="modal-form-grid">
      <div class="full">
        <input id="editName" class="form-input" placeholder="Product Name">
      </div>
      <input id="editPrice" type="number" class="form-input" placeholder="Price (₹)">
      <input id="editDiscountPrice" type="number" class="form-input" placeholder="Discount Price (₹)">
      <input id="editStock" type="number" class="form-input" placeholder="Stock Quantity">
      <div class="full">
        <input id="editImage" class="form-input" placeholder="Image URL">
      </div>
      <div class="full">
        <textarea id="editDescription" class="form-input" placeholder="Description"></textarea>
      </div>
      <div class="full">
        <select id="editCategory" class="form-input">
          <option value="Attar Roll On">Attar Roll On</option>
          <option value="Travelling Collection">Travelling Collection</option>
          <option value="Body Mist">Body Mist</option>
          <option value="Perfume 75ml">Perfume 75ml</option>
          <option value="Oudh Collection">Oudh Collection</option>
          <option value="Bakhoor">Bakhoor</option>
          <option value="Air Freshener">Air Freshener</option>
          <option value="Combo Packs">Combo Packs</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-primary" id="editSaveBtn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ===== CONFIRM DELETE MODAL ===== -->
<div id="confirmModal" class="modal-overlay">
  <div class="confirm-box">
    <div class="modal-title" style="color:#f44336;">Delete Product?</div>
    <p>This action cannot be undone. The product will be permanently removed.</p>
    <input type="hidden" id="deleteId">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfirmModal()">Cancel</button>
      <button class="btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="page-header">
  <h2>Admin Products</h2>
  <button class="back-home-btn" onclick="goHomePage()">← Home</button>
</div>

<div class="container">

  <!-- ADD PRODUCT FORM -->
  <div class="add-form-card">
    <div class="add-form-title">Add New Product</div>
    <div class="form-grid-2">
      <input id="name" class="form-input" placeholder="Product Name *">
      <input id="price" type="number" class="form-input" placeholder="Price (₹) *">
      <input id="discountPrice" type="number" class="form-input" placeholder="Discount Price (₹)">
      <input id="stock" type="number" class="form-input" placeholder="Stock Quantity">
      <div class="full">
        <input id="image" class="form-input" placeholder="Image URL *">
      </div>
      <div class="full">
        <textarea id="description" class="form-input" placeholder="Description"></textarea>
      </div>
      <div class="full">
        <select id="category" class="form-input">
          <option value="Attar Roll On">Attar Roll On</option>
          <option value="Travelling Collection">Travelling Collection</option>
          <option value="Body Mist">Body Mist</option>
          <option value="Perfume 75ml">Perfume 75ml</option>
          <option value="Oudh Collection">Oudh Collection</option>
          <option value="Bakhoor">Bakhoor</option>
          <option value="Air Freshener">Air Freshener</option>
          <option value="Combo Packs">Combo Packs</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button id="addBtn" class="btn-primary" onclick="addProduct()">Add Product</button>
    </div>
  </div>

  <div id="products" class="grid"></div>

</div>

<script src="js/common.js"></script>
<script>
  adminGuard();
</script>
<script>

const user = JSON.parse(localStorage.getItem("user"));
if(!user || user.role !== "admin"){
  window.location.href = "index.html";
}

/* ===== TOAST ===== */
function showToast(msg, type="info"){
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  document.getElementById("toastContainer").appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

/* ===== LOAD PRODUCTS ===== */
async function loadProducts(){
  const container = document.getElementById("products");
  container.innerHTML = `<p style="color:#555;grid-column:1/-1">Loading products...</p>`;

  try{
    const res = await fetch("https://alabuzer-backend.onrender.com/api/products");
    const data = await res.json();
    container.innerHTML = "";

    if(!data.data || data.data.length === 0){
      container.innerHTML = `<p style="color:#555;grid-column:1/-1">No products found.</p>`;
      return;
    }

    data.data.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";

      const stockClass = p.stock === 0 ? "no-stock" : p.stock <= 5 ? "low-stock" : "in-stock";
      const stockLabel = p.stock === 0 ? "Out of Stock" : p.stock <= 5 ? `Low: ${p.stock}` : `${p.stock} in stock`;

      const priceHtml = p.discountPrice
        ? `<span style="color:#d4af37;font-weight:700;">₹${p.discountPrice}</span><span class="original-price">₹${p.price}</span>`
        : `<span style="color:#d4af37;font-weight:700;">₹${p.price}</span>`;

      div.innerHTML = `
        <div class="card-img-wrap">
          <img src="${p.images?.[0] || 'https://dummyimage.com/300'}" alt="${p.name}" loading="lazy" onerror="this.src='https://dummyimage.com/300'">
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-meta">${p.category || "—"}</div>
          <div class="card-price">${priceHtml}</div>
          <div style="margin-bottom:12px;">
            <span class="stock-badge ${stockClass}">${stockLabel}</span>
          </div>
          <div class="card-actions">
            <button class="btn-edit" onclick="openEditModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">Edit</button>
            <button class="btn-delete" onclick="openConfirmModal('${p._id}')">Delete</button>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
  }catch(err){
    console.error(err);
    container.innerHTML = `<p style="color:#f44336;grid-column:1/-1">Failed to load products.</p>`;
  }
}

/* ===== ADD PRODUCT ===== */
async function addProduct(){
  const name  = document.getElementById("name").value.trim();
  const price = Number(document.getElementById("price").value);
  const discountPrice = Number(document.getElementById("discountPrice").value) || undefined;
  const image = document.getElementById("image").value.trim();
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value.trim();
  const stock = Number(document.getElementById("stock").value) || 0;

  if(!name || !price || !image || !category){
    showToast("Please fill all required fields (*)", "error");
    return;
  }

  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  btn.textContent = "Adding...";

  try{
    const token = localStorage.getItem("token");
    const body = { name, price, description, stock, images:[image], category, isActive:true };
    if(discountPrice) body.discountPrice = discountPrice;

    const res = await fetch("https://alabuzer-backend.onrender.com/api/products",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if(!data.success){
      showToast(data.error || "Failed to add product", "error");
      return;
    }

    showToast("Product added successfully ✓", "success");
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("discountPrice").value = "";
    document.getElementById("image").value = "";
    document.getElementById("description").value = "";
    document.getElementById("stock").value = "";
    loadProducts();
  }catch(err){
    console.error(err);
    showToast("Network error. Please try again.", "error");
  }finally{
    btn.disabled = false;
    btn.textContent = "Add Product";
  }
}

/* ===== EDIT MODAL ===== */
function openEditModal(product){
  document.getElementById("editId").value = product._id;
  document.getElementById("editName").value = product.name || "";
  document.getElementById("editPrice").value = product.price || "";
  document.getElementById("editDiscountPrice").value = product.discountPrice || "";
  document.getElementById("editStock").value = product.stock || "";
  document.getElementById("editImage").value = product.images?.[0] || "";
  document.getElementById("editDescription").value = product.description || "";
  document.getElementById("editCategory").value = product.category || "Attar Roll On";
  document.getElementById("editModal").classList.add("active");
}

function closeEditModal(){
  document.getElementById("editModal").classList.remove("active");
}

async function saveEdit(){
  const id = document.getElementById("editId").value;
  const name  = document.getElementById("editName").value.trim();
  const price = Number(document.getElementById("editPrice").value);
  const discountPrice = Number(document.getElementById("editDiscountPrice").value) || undefined;
  const stock = Number(document.getElementById("editStock").value) || 0;
  const image = document.getElementById("editImage").value.trim();
  const description = document.getElementById("editDescription").value.trim();
  const category = document.getElementById("editCategory").value;

  if(!name || !price){
    showToast("Name and price are required", "error");
    return;
  }

  const btn = document.getElementById("editSaveBtn");
  btn.disabled = true;
  btn.textContent = "Saving...";

  try{
    const token = localStorage.getItem("token");
    const body = { name, price, description, stock, category };
    if(image) body.images = [image];
    if(discountPrice) body.discountPrice = discountPrice;

    const res = await fetch(`https://alabuzer-backend.onrender.com/api/products/${id}`,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if(!res.ok && data.success === false){
      showToast(data.error || "Update failed", "error");
      return;
    }

    showToast("Product updated successfully ✓", "success");
    closeEditModal();
    loadProducts();
  }catch(err){
    console.error(err);
    showToast("Network error. Please try again.", "error");
  }finally{
    btn.disabled = false;
    btn.textContent = "Save Changes";
  }
}

/* ===== DELETE CONFIRM ===== */
function openConfirmModal(id){
  document.getElementById("deleteId").value = id;
  document.getElementById("confirmModal").classList.add("active");
}

function closeConfirmModal(){
  document.getElementById("confirmModal").classList.remove("active");
}

async function confirmDelete(){
  const id = document.getElementById("deleteId").value;
  const btn = document.getElementById("confirmDeleteBtn");
  btn.disabled = true;
  btn.textContent = "Deleting...";

  try{
    const token = localStorage.getItem("token");
    await fetch(`https://alabuzer-backend.onrender.com/api/products/${id}`,{
      method:"DELETE",
      headers:{ "Authorization":"Bearer " + token }
    });
    showToast("Product deleted", "success");
    closeConfirmModal();
    loadProducts();
  }catch(err){
    console.error(err);
    showToast("Delete failed. Try again.", "error");
  }finally{
    btn.disabled = false;
    btn.textContent = "Delete";
  }
}

function goHomePage(){
  window.location.href = "index.html";
}

/* ===== CLOSE MODALS ON OVERLAY CLICK ===== */
document.getElementById("editModal").addEventListener("click", e => {
  if(e.target === document.getElementById("editModal")) closeEditModal();
});
document.getElementById("confirmModal").addEventListener("click", e => {
  if(e.target === document.getElementById("confirmModal")) closeConfirmModal();
});

loadProducts();

</script>

</body>
</html>
