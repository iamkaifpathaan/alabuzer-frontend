<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="styles/global.css">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
<link rel="manifest" href="assets/favicon/site.webmanifest">
<link rel="icon" href="assets/favicon/favicon.ico">
<style>

body{
background:#0b0b0b;
color:white;
font-family:Montserrat;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#111;
border:1px solid rgba(212,175,55,0.25);
padding:15px;
border-radius:8px;
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
margin-bottom:10px;
}

button{
padding:6px 10px;
margin-right:6px;
cursor:pointer;
}

input{
padding:6px;
margin:5px;
}

</style>

</head>

<body>

<div class="container">

<div style="display:flex; justify-content:space-between; align-items:center;">
  <h2>Admin Products</h2>
  <button class="back-home-btn" onclick="goHomePage()">← Home</button>
</div>

<div>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="slug" placeholder="Slug (unique name)">
<textarea id="description" placeholder="Description"></textarea>
<input id="stock" type="number" placeholder="Stock Quantity">
<input id="image" placeholder="Image URL">
<label>Category</label>
<select id="category">
  <option value="Attar Roll On">Attar Roll On</option>
  <option value="Travelling Collection">Travelling Collection</option>
  <option value="Body Mist">Body Mist</option>
  <option value="Perfume 75ml">Perfume 75ml</option>
  <option value="Oudh Collection">Oudh Collection</option>
  <option value="Bakhoor">Bakhoor</option>
  <option value="Air Freshener">Air Freshener</option>
  <option value="Combo Packs">Combo Packs</option>
</select>

<button onclick="addProduct()">Add Product</button>

</div>

<div id="products" class="grid"></div>

</div>
<script src="js/common.js"></script>
<script>
  adminGuard();
</script>
<script>
const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "admin"){
  window.location.href = "index.html";
}

async function loadProducts(){

const res = await fetch("https://alabuzer-backend.onrender.com/api/products");
const data = await res.json();

const container = document.getElementById("products");
container.innerHTML="";

data.data.forEach(p=>{

const div = document.createElement("div");
div.className="card";

div.innerHTML=`

<img src="${p.images?.[0] || 'https://dummyimage.com/300'}">

<div>${p.name}</div>
<div>₹${p.price}</div>

<button onclick="deleteProduct('${p._id}')">Delete</button>

`;

container.appendChild(div);

});

}

async function addProduct(){

  const name = document.getElementById("name").value;
  const price = Number(document.getElementById("price").value);
  const image = document.getElementById("image").value;
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value;
  const stock = Number(document.getElementById("stock").value);

  const slug = name
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-|-$)/g, "");

  await fetch("https://alabuzer-backend.onrender.com/api/products",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name,
      slug,
      price,
      description,
      stock,
      images:[image],
      category,
      isActive:true
    })
  });

  // Clear form after adding
  document.getElementById("name").value="";
  document.getElementById("price").value="";
  document.getElementById("image").value="";
  document.getElementById("description").value="";
  document.getElementById("stock").value="";

  loadProducts();
}

function goHomePage(){
  window.location.href = "index.html";
}

async function deleteProduct(id){

await fetch(`https://alabuzer-backend.onrender.com/api/products/${id}`,{
method:"DELETE"
});

loadProducts();

}

loadProducts();

</script>

</body>
</html>
